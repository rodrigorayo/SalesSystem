name: Automated Testing (Pytest)

on:
  push:
    branches:
      - main
      - 'feature/*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11" # Asegúrate de que esto coincida con la versión de producción

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run Pytest
      env:
        MONGO_URI: "mongodb://127.0.0.1:27017/salessystem_test"
        PYTHONPATH: "backend"
      run: |
        cd backend
        pytest tests/ -v
